name: Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      sourcemod_version:
        description: SourceMod version to download
        required: false
        default: "1.12"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  SOURCEMOD_VERSION: ${{ github.event.inputs.sourcemod_version || '1.12' }}
  SOURCEMOD_ARCHIVE_URL: https://www.sourcemod.net/latest.php?os=linux&version=${{ github.event.inputs.sourcemod_version || '1.12' }}

jobs:
  create-release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install SourceMod build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes curl tar python3

      - name: Show SourceMod version
        run: |
          echo "SOURCEMOD_VERSION=${SOURCEMOD_VERSION}"
          echo "SOURCEMOD_ARCHIVE_URL=${SOURCEMOD_ARCHIVE_URL}"

      - name: Build SourceMod artifact
        run: bash ./scripts/ci-build-sourcemod.sh

      - name: Validate SourceMod artifact
        run: bash ./scripts/ci-validate-artifact.sh

      - name: Resolve release metadata
        id: release
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "basename=afk-on-readyup-${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "title=AFK on ReadyUp ${version}" >> "$GITHUB_OUTPUT"

      - name: Package release assets
        env:
          RELEASE_BASENAME: ${{ steps.release.outputs.basename }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: bash ./scripts/ci-package-release-assets.sh

      - name: Upload release zip artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.release.outputs.basename }}
          path: dist/release/${{ steps.release.outputs.basename }}.zip
          if-no-files-found: error
          retention-days: 14

      - name: Extract release notes from changelog
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          mkdir -p dist/release
          bash ./scripts/ci-extract-changelog-release-notes.sh "$RELEASE_VERSION" dist/release/release-notes.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          title="${{ steps.release.outputs.title }}"
          asset="dist/release/${{ steps.release.outputs.basename }}.zip"
          notes="dist/release/release-notes.md"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --title "$title" --notes-file "$notes" --latest
            gh release upload "$tag" "$asset" --clobber
            exit 0
          fi

          gh release create "$tag" "$asset" --title "$title" --notes-file "$notes" --verify-tag --latest
